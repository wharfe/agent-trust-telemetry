# Detection rules for secret_access_attempt policy class.
# These rules detect attempts to extract API keys, passwords, tokens,
# credentials, or other sensitive information.

- id: "rule:secret_access:001"
  description: "Detects requests to reveal API keys, tokens, or passwords"
  targets:
    - field: "content"
    - field: "tool_context.description_raw"
  pattern: "(reveal|show|display|print|output|tell me|give me|share|expose|leak|dump|list) .{0,30}(api[_ ]?keys?|secret[_ ]?keys?|access[_ ]?keys?|tokens?|passwords?|passphrases?|credentials?|private[_ ]?keys?|secrets)"
  match_type: "regex_case_insensitive"
  policy_class: "secret_access_attempt"
  confidence: 0.85
  severity: "critical"
  weight: 1.0

- id: "rule:secret_access:002"
  description: "Detects requests to access environment variables or config files for secrets"
  targets:
    - field: "content"
    - field: "tool_context.description_raw"
  pattern: '(read|access|cat|print|show|display|dump) .*(\.env|environment variable|config|credentials?\.(json|yaml|yml|toml)|secrets?\.(json|yaml|yml|toml)|\.aws/credentials|\.ssh/|\.netrc)'
  match_type: "regex_case_insensitive"
  policy_class: "secret_access_attempt"
  confidence: 0.80
  severity: "high"
  weight: 1.0

- id: "rule:secret_access:003"
  description: "Detects attempts to extract system prompt content"
  targets:
    - field: "content"
    - field: "tool_context.description_raw"
  pattern: "(reveal|show|repeat|output|print|tell me|what is|what are|display) .{0,20}(system prompt|system instructions|system message|initial instructions|hidden instructions|internal instructions|original prompt|full prompt)"
  match_type: "regex_case_insensitive"
  policy_class: "secret_access_attempt"
  confidence: 0.80
  severity: "high"
  weight: 1.0

- id: "rule:secret_access:004"
  description: "Detects references to common secret storage patterns"
  targets:
    - field: "content"
    - field: "tool_context.description_raw"
  pattern: "(vault|keychain|key ?ring|secret ?manager|ssm parameter|kms) .*(get|fetch|retrieve|read|extract|decrypt|access)"
  match_type: "regex_case_insensitive"
  policy_class: "secret_access_attempt"
  confidence: 0.75
  severity: "high"
  weight: 1.0
